<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProSync - Registro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1120;
            background-image: 
                radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(30, 64, 175, 0.15) 0px, transparent 50%);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-12 h-12 bg-violet-600 rounded-2xl flex items-center justify-center shadow-lg shadow-violet-500/20 mb-4">
                <i data-lucide="layers" class="text-white w-7 h-7"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">ProSync</h1>
            <p class="text-slate-400 mt-2">Crea tu cuenta gratis hoy mismo</p>
        </div>

        <!-- Card -->
        <div class="glass-card p-8 rounded-3xl shadow-2xl">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-white">Regístrate</h2>
                <p class="text-sm text-slate-400">Únete a la mejor plataforma de gestión</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Nombre de usuario</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                        <input type="text" id="username" placeholder="Tu nombre" 
                               class="w-full bg-slate-900/50 border border-slate-700 rounded-xl pl-12 pr-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500 transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Correo electrónico</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                        <input type="email" id="email" placeholder="nombre@ejemplo.com" 
                               class="w-full bg-slate-900/50 border border-slate-700 rounded-xl pl-12 pr-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500 transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Contraseña</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" 
                               class="w-full bg-slate-900/50 border border-slate-700 rounded-xl pl-12 pr-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500 transition-all">
                    </div>
                </div>

                <p id="mensaje" class="text-sm font-medium min-h-[20px] text-center"></p>

                <button onclick="registrar()" class="w-full bg-violet-600 hover:bg-violet-700 text-white px-4 py-3.5 rounded-xl font-bold transition-all shadow-lg shadow-violet-500/20 active:scale-[0.98]">
                    Crear Cuenta
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
                <p class="text-sm text-slate-400">
                    ¿Ya tienes una cuenta? 
                    <a href="/login.html" class="text-violet-400 font-semibold hover:text-violet-300 transition-colors">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
